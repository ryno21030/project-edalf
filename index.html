<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화장실 휴지 잔여량 모니터링</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    #last-update {
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #639922;
      display: inline-block;
    }

    /* 요약 카드 3개 */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: #eeecea;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .summary-card .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 24px;
      font-weight: 500;
    }

    .value.ok   { color: #3B6D11; }
    .value.warn { color: #A32D2D; }

    /* 칸별 카드 그리드 */
    #stalls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .stall-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 14px;
      padding: 1rem 1.1rem;
    }

    .stall-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stall-name {
      font-size: 14px;
      font-weight: 500;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 8px;
    }

    /* 게이지 바 */
    .bar-bg {
      background: #eee;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .stall-footer {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #888;
    }

    .stall-footer .pct {
      font-size: 13px;
      font-weight: 500;
    }

    /* 버튼 */
    .actions {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 0.5px solid #ddd;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      font-size: 13px;
      padding: 7px 16px;
      border: 0.5px solid #bbb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #f0efec; }
  </style>
</head>
<body>

  <header>
    <div>
      <p style="font-size:13px; color:#888; margin-bottom:4px;">학교 화장실 실시간 모니터링</p>
      <h1>휴지 잔여량 현황</h1>
    </div>
    <div id="last-update">
      <span id="status-dot"></span>
      <span id="update-time">방금 업데이트됨</span>
    </div>
  </header>

  <!-- 요약 숫자 -->
  <div class="summary">
    <div class="summary-card">
      <div class="label">전체 칸 수</div>
      <div class="value" id="total-count">6</div>
    </div>
    <div class="summary-card">
      <div class="label">정상</div>
      <div class="value ok" id="ok-count">-</div>
    </div>
    <div class="summary-card">
      <div class="label">보충 필요</div>
      <div class="value warn" id="warn-count">-</div>
    </div>
  </div>

  <!-- 칸별 카드 -->
  <div id="stalls-grid"></div>

  <!-- 버튼 -->
  <div class="actions">
    <button id="connect-btn" onclick="connectSerial()">🔌 아두이노 연결</button>
    <button onclick="simulateUpdate()">🔄 시뮬레이션</button>
  </div>

<script>
  const stalls = [
    { id: 1, name: "1번 칸", level: 0 },
  ];

  // ── 잔여량에 따라 색깔/라벨 결정 ──
  function getStyle(level) {
    if (level >= 40) return { bar: "#639922", text: "#3B6D11", bg: "#EAF3DE", label: "충분" };
    if (level >= 20) return { bar: "#BA7517", text: "#854F0B", bg: "#FAEEDA", label: "주의" };
    return { bar: "#E24B4A", text: "#A32D2D", bg: "#FCEBEB", label: "보충 필요" };
  }

  // ── 카드 화면에 그리기 ──
  function renderStalls() {
    const grid = document.getElementById("stalls-grid");
    grid.innerHTML = stalls.map(s => {
      const c = getStyle(s.level);
      return `
        <div class="stall-card">
          <div class="stall-header">
            <span class="stall-name">${s.name}</span>
            <span class="badge" style="background:${c.bg}; color:${c.text};">${c.label}</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${s.level}%; background:${c.bar};"></div>
          </div>
          <div class="stall-footer">
            <span>잔여량</span>
            <span class="pct" style="color:${c.text};">${s.level}%</span>
          </div>
        </div>
      `;
    }).join("");

    const ok   = stalls.filter(s => s.level >= 40).length;
    const warn = stalls.filter(s => s.level <  40).length;
    document.getElementById("ok-count").textContent    = ok;
    document.getElementById("warn-count").textContent  = warn;
    document.getElementById("total-count").textContent = stalls.length;
  }

  // ── 시간 표시 ──
  function updateTime() {
    const now = new Date();
    const hh  = now.getHours();
    const mm  = String(now.getMinutes()).padStart(2, "0");
    document.getElementById("update-time").textContent = `${hh}:${mm} 업데이트됨`;
  }

  // ── 아두이노에서 받은 한 줄 처리: "1,73" 또는 "1,ERR" ──
  function handleLine(line) {
    const parts = line.split(",");
    if (parts.length !== 2) return;

    const id    = parseInt(parts[0]);
    const value = parts[1].trim();

    let stall = stalls.find(s => s.id === id);
    if (!stall) {
      stall = { id, name: `${id}번 칸`, level: 0 };
      stalls.push(stall);
    }

    if (value === "ERR") return;
    stall.level = parseInt(value);
    renderStalls();
    updateTime();
  }

  // ── Web Serial 연결 ──
  let serialBuffer = "";

  async function connectSerial() {
    if (!("serial" in navigator)) {
      alert("Web Serial API를 지원하지 않는 브라우저입니다.\nChrome 또는 Edge를 사용하세요.");
      return;
    }

    try {
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 9600 });

      document.getElementById("connect-btn").textContent = "✅ 연결됨";
      document.getElementById("status-dot").style.background = "#639922";

      const decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable);
      const reader = decoder.readable.getReader();

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        serialBuffer += value;
        const lines = serialBuffer.split("\n");
        serialBuffer = lines.pop(); // 마지막 미완성 줄은 버퍼에 보관
        lines.forEach(l => handleLine(l.trim()));
      }
    } catch (e) {
      document.getElementById("connect-btn").textContent = "🔌 아두이노 연결";
      document.getElementById("status-dot").style.background = "#ccc";
    }
  }

  // ── 시뮬레이션 버튼 (아두이노 없이 테스트용) ──
  function simulateUpdate() {
    stalls.forEach(s => {
      s.level = Math.max(3, Math.min(99, s.level + Math.floor(Math.random() * 21) - 10));
    });
    renderStalls();
    updateTime();
  }

  renderStalls();
</script>

</body>
</html>
